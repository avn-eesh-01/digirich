<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6c36b"/>
      <stop offset="100%" stop-color="#d88a2d"/>
    </linearGradient>
  </defs>

  <!-- Coin -->
  <ellipse cx="256" cy="256" rx="200" ry="200" fill="url(#coinGrad)" />

  <!-- Inner shadow effect -->
  <ellipse cx="256" cy="256" rx="160" ry="160" fill="#e6a94f" opacity="0.6"/>

  <!-- Rupee Symbol -->
  <text x="256" y="290" text-anchor="middle" font-size="160" font-family="Arial, sans-serif" fill="#ffffff" font-weight="bold">
    ₹
  </text>
</svg>
