<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="800" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

<defs>
  <!-- Darker photorealistic gold gradient -->
  <radialGradient id="goldCore" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#f5d27a"/>
    <stop offset="40%" stop-color="#d4af37"/>
    <stop offset="70%" stop-color="#a67c1a"/>
    <stop offset="100%" stop-color="#5a430f"/>
  </radialGradient>

  <!-- Edge shine -->
  <linearGradient id="edgeLight" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#fff2b0" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
  </linearGradient>

  <!-- Dark facet -->
  <linearGradient id="facetDark" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#8c6b1f"/>
    <stop offset="100%" stop-color="#3e2e0a"/>
  </linearGradient>

</defs>

<!-- Base hexagon -->
<polygon points="256,40 440,150 440,360 256,470 72,360 72,150"
         fill="url(#goldCore)" stroke="#8c6b1f" stroke-width="4"/>

<!-- Facets for 3D look -->
<polygon points="256,40 440,150 256,256" fill="#d4af37" opacity="0.85"/>
<polygon points="440,150 440,360 256,256" fill="url(#facetDark)" opacity="0.9"/>
<polygon points="440,360 256,470 256,256" fill="#b8962e" opacity="0.85"/>
<polygon points="256,470 72,360 256,256" fill="url(#facetDark)" opacity="0.95"/>
<polygon points="72,360 72,150 256,256" fill="#d4af37" opacity="0.8"/>
<polygon points="72,150 256,40 256,256" fill="#f5d27a" opacity="0.9"/>

<!-- Center highlight line -->
<line x1="256" y1="40" x2="256" y2="470" stroke="#fff2b0" stroke-width="2" opacity="0.4"/>

</svg>
