<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7e1a6;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#735c00;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7e1a6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Main Hexagon -->
  <path d="M50 5 L89 27.5 L89 72.5 L50 95 L11 72.5 L11 27.5 Z" 
        fill="url(#gold-grad)" 
        stroke="#735c00" 
        stroke-width="1"
        filter="url(#shadow)"/>
  <!-- Inner Highlight -->
  <path d="M50 12 L82 30.5 L82 69.5 L50 88 L18 69.5 L18 30.5 Z" 
        fill="none" 
        stroke="rgba(255,255,255,0.4)" 
        stroke-width="1.5" />
  <!-- Bevel effect -->
  <path d="M50 5 L89 27.5 L50 50 Z" fill="rgba(255,255,255,0.2)" />
  <path d="M89 72.5 L50 95 L50 50 Z" fill="rgba(0,0,0,0.1)" />
</svg>
